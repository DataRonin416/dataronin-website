<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <!-- Background (optional - transparent by default) -->
  <rect width="800" height="200" fill="transparent"/>
  
  <!-- V Icon -->
  <g id="v-icon">
    <!-- Outer V shape -->
    <path d="M 40 40 L 100 160 L 160 40 L 140 40 L 100 120 L 60 40 Z" 
          fill="#e74c3c" 
          stroke="#c0392b" 
          stroke-width="2"/>
    
    <!-- Inner accent for depth -->
    <path d="M 70 40 L 100 100 L 130 40 L 115 40 L 100 70 L 85 40 Z" 
          fill="#c0392b" 
          opacity="0.6"/>
    
    <!-- Highlight for modern look -->
    <path d="M 55 40 L 65 40 L 100 115 L 97 120 Z" 
          fill="#ffffff" 
          opacity="0.2"/>
  </g>
  
  <!-- VENDITTI Text -->
  <g id="text">
    <text x="200" y="130" 
          font-family="'Helvetica Neue', 'Arial', sans-serif" 
          font-size="85" 
          font-weight="700" 
          letter-spacing="4"
          fill="#2c3e50">VENDITTI</text>
    
    <!-- Optional subtle shadow for depth -->
    <text x="202" y="132" 
          font-family="'Helvetica Neue', 'Arial', sans-serif" 
          font-size="85" 
          font-weight="700" 
          letter-spacing="4"
          fill="#e74c3c" 
          opacity="0.15">VENDITTI</text>
  </g>
  
  <!-- Optional tagline area -->
  <text x="200" y="155" 
        font-family="'Helvetica Neue', 'Arial', sans-serif" 
        font-size="18" 
        font-weight="300" 
        letter-spacing="2"
        fill="#7f8c8d">GEOTECHNICAL SOLUTIONS</text>
</svg>