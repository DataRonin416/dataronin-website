<svg width="120" height="120" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Background circle for modern app icon look -->
  <circle cx="60" cy="60" r="58" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  
  <!-- V Icon centered and scaled -->
  <g id="v-icon" transform="translate(30, 20)">
    <!-- Outer V shape -->
    <path d="M 0 0 L 30 60 L 60 0 L 50 0 L 30 40 L 10 0 Z" 
          fill="#ffffff" 
          stroke="rgba(255,255,255,0.3)" 
          stroke-width="1.5"/>
    
    <!-- Inner accent for depth -->
    <path d="M 15 0 L 30 30 L 45 0 L 37.5 0 L 30 15 L 22.5 0 Z" 
          fill="rgba(255,255,255,0.6)"/>
    
    <!-- Highlight -->
    <path d="M 7.5 0 L 12.5 0 L 30 38 L 28.5 40 Z" 
          fill="#ffffff" 
          opacity="0.4"/>
  </g>
  
  <!-- Optional small text -->
  <text x="60" y="95" 
        font-family="'Helvetica Neue', 'Arial', sans-serif" 
        font-size="14" 
        font-weight="600" 
        letter-spacing="1"
        text-anchor="middle"
        fill="#ffffff">VENDITTI</text>
</svg>