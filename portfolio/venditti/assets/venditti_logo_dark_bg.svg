<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <!-- Background matching cover page -->
  <defs>
    <linearGradient id="coverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c0392b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c3e50;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="200" fill="url(#coverGradient)"/>
  
  <!-- V Icon - White version for dark background -->
  <g id="v-icon">
    <!-- Outer V shape -->
    <path d="M 40 40 L 100 160 L 160 40 L 140 40 L 100 120 L 60 40 Z" 
          fill="#ffffff" 
          stroke="rgba(255,255,255,0.3)" 
          stroke-width="2"/>
    
    <!-- Inner accent for depth -->
    <path d="M 70 40 L 100 100 L 130 40 L 115 40 L 100 70 L 85 40 Z" 
          fill="rgba(255,255,255,0.4)" 
          opacity="0.6"/>
    
    <!-- Highlight -->
    <path d="M 55 40 L 65 40 L 100 115 L 97 120 Z" 
          fill="#ffffff" 
          opacity="0.3"/>
  </g>
  
  <!-- VENDITTI Text - White for dark background -->
  <g id="text">
    <text x="200" y="130" 
          font-family="'Helvetica Neue', 'Arial', sans-serif" 
          font-size="85" 
          font-weight="300" 
          letter-spacing="4"
          fill="#ffffff"
          style="text-shadow: 2px 2px 4px rgba(0,0,0,0.3)">VENDITTI</text>
  </g>
  
  <!-- Optional tagline -->
  <text x="200" y="155" 
        font-family="'Helvetica Neue', 'Arial', sans-serif" 
        font-size="18" 
        font-weight="300" 
        letter-spacing="2"
        fill="rgba(255,255,255,0.8)">GEOTECHNICAL SOLUTIONS</text>
</svg>